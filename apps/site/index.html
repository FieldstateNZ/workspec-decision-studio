<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WorkSpec Decision Studio — costed architecture decisions as YAML</title>
    <meta
      name="description"
      content="Cost architecture decisions across dev/test/prod, weigh them on the criteria that matter, and record the outcome as an ADR — all as reviewable *.decision.yaml files that version with git. Free, standalone, git-native."
    />
    <script>
      // No-flash theming (see @workspec/design docs/theming.md): set BOTH
      // WorkSpec theme signals — the data-aesthetic/data-theme attribute pair
      // (activates the token palette) and the .dark class (activates
      // Tailwind's dark: variant) — synchronously, before any stylesheet or
      // app bundle loads. The site follows prefers-color-scheme; main.tsx
      // keeps the signals in sync when the OS preference changes.
      (function () {
        var root = document.documentElement;
        var dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        root.setAttribute('data-aesthetic', 'console');
        root.setAttribute('data-theme', dark ? 'dark' : 'light');
        root.classList.toggle('dark', dark);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
