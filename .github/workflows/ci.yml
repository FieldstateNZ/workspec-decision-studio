name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN for every job in this workflow (CodeQL hardening).
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm -r build

  # S6: module-federation integration proof. Builds the decision-ui REMOTE and
  # the smoke HOST, then a Playwright check asserts DecisionCard renders the
  # golden cost AND that react is a single shared instance across the boundary.
  # Separate job so the lint/typecheck/test/build job above stays untouched.
  mf-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Builds every workspace lib (schema/engine/ui/studio) + the smoke host.
      # The remote build below resolves @workspec/decision-engine and
      # @workspec/decision-schema from their built dist, so this must run first.
      - name: Build workspace (libs + smoke host)
        run: pnpm -r build

      - name: Build MF remote (@workspec/decision-ui)
        run: pnpm --filter @workspec/decision-ui build:mf

      # The GitHub runner has no pre-installed browser; fetch Chromium here.
      - name: Install Playwright Chromium
        run: pnpm --filter @workspec/mf-host exec playwright install --with-deps chromium

      - name: Run MF smoke (Playwright)
        run: pnpm --filter @workspec/mf-host exec playwright test

  # S7: full standalone E2E against the REAL studio host (Express + Vite client +
  # FsRepository). Boots `node dist/bin.js serve` over a temp copy of the
  # hosting-platform example and drives the whole loop in a browser: open → toggle a lever → cost
  # changes → decide → ADR renders → the *.decision.yaml on disk gains
  # status:decided + a recorded outcome. Separate job so the core lint/typecheck/
  # test/build job stays untouched.
  standalone-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Builds studio's dist/bin.js + dist/client (and the libs it resolves).
      - name: Build workspace
        run: pnpm -r build

      # The GitHub runner has no pre-installed browser; fetch Chromium here.
      - name: Install Playwright Chromium
        run: pnpm --filter @workspec/decision-studio exec playwright install --with-deps chromium

      - name: Run standalone E2E (Playwright)
        run: pnpm --filter @workspec/decision-studio e2e
