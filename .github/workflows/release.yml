name: Release (publish to npm)

# Publishes all four @workspec/* packages to npm when a version tag is pushed
# (e.g. `v0.1.0-alpha.0`).
#
# Auth is via npm TRUSTED PUBLISHING (OIDC) — there is NO `NPM_TOKEN` secret.
# GitHub mints a short-lived id-token (`id-token: write` below) and npm exchanges
# it for publish rights. Provenance is attached automatically. Prerequisites:
#   1. A trusted publisher registered on npmjs.com for each package, pointing at
#      owner FieldstateNZ / repo workspec-decision-studio / workflow release.yml.
#   2. npm CLI >= 11.5.1 (Node 20 ships npm 10, so we upgrade below).
# Then:
#   pnpm version ...            # bump the four packages
#   git tag v0.1.0-alpha.0 && git push --tags
# See RELEASING.md for the full runbook (and the manual path).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing (OIDC) requires a recent npm; Node 20 ships npm 10.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      # Belt-and-braces gate before anything leaves the machine.
      - name: Verify
        run: |
          pnpm typecheck
          pnpm test

      # OIDC trusted publishing — no NODE_AUTH_TOKEN, no NPM_CONFIG_PROVENANCE.
      # Provenance is attached automatically. This is a pnpm workspace (there is
      # no npm `workspaces` field in the root package.json), so we publish each
      # public package from its own directory with the npm CLI — the most
      # reliable OIDC path today — rather than via `npm publish --workspace`.
      - name: Publish (OIDC)
        run: |
          for pkg in schema engine ui studio; do
            ( cd "packages/$pkg" && npm publish --access public )
          done
