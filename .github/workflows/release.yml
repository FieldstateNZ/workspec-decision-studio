name: Release (publish to npm)

# Publishes all four @workspec/* packages to npm with provenance when a version
# tag is pushed (e.g. `v0.1.0-alpha.0`). Provenance requires `id-token: write`
# and is turned on per-package via `publishConfig.provenance: true`.
#
# Setup once: add an automation `NPM_TOKEN` (publish scope) as a repo secret and
# ensure the @workspec org grants this token publish rights. Then:
#   pnpm version ...            # bump the four packages
#   git tag v0.1.0-alpha.0 && git push --tags
# See RELEASING.md for the full runbook (and the manual path).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      # Belt-and-braces gate before anything leaves the machine.
      - name: Verify
        run: |
          pnpm typecheck
          pnpm test

      # Publishes only the public @workspec/* libs (examples are private and
      # skipped). `publishConfig.provenance` + id-token:write attaches provenance.
      - name: Publish
        run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
